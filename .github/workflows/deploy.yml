name: 🚀 Deploy — Controllus

# Dispara no push para main (produção) ou manualmente pelo GitHub UI
on:
  push:
    branches: [master, main]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: controllus   # ← nome exato do App Service no Azure
  NODE_VERSION: '20'

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Build ───────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🔍 Lint
        run: npm run lint

      - name: 🏗️ Build (Next.js standalone)
        run: npm run build
        env:
          NODE_ENV: production
          # As secrets são usadas apenas em tempo de build se necessário.
          # Em produção, lidas das App Settings do Azure (injetadas pelo Key Vault).
          NASA_API_KEY:           ${{ secrets.NASA_API_KEY }}
          RELIEFWEB_APP_NAME:     ${{ secrets.RELIEFWEB_APP_NAME }}

      # O output standalone não inclui public/ nem .next/static/ automaticamente.
      # Copiamos manualmente conforme documentação Next.js.
      - name: 📋 Copiar public/ e static/ para o standalone
        run: |
          cp -r public   .next/standalone/public
          cp -r .next/static .next/standalone/.next/static

      - name: 📤 Upload do artefato de build
        uses: actions/upload-artifact@v4
        with:
          name: controllus-build
          path: .next/standalone
          retention-days: 1

  # ── 2. Deploy → Azure ──────────────────────────────────────────────────────
  deploy:
    name: Deploy → Azure App Service
    runs-on: ubuntu-latest
    needs: build

    # Registra o deploy no GitHub Environments (aparece no Deployment Center)
    environment:
      name: production
      url: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net

    steps:
      - name: 📥 Download do artefato
        uses: actions/download-artifact@v4
        with:
          name: controllus-build
          path: ./deploy

      - name: 🔐 Login no Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 🚀 Deploy para Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package:  ./deploy
          # Standalone Next.js é iniciado com node server.js (não npm start)
          startup-command: node server.js

      - name: 🔓 Logout do Azure
        if: always()
        run: az logout
