name: 🚀 Deploy — Controllus

on:
  push:
    branches: [master, main]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: controllus
  NODE_VERSION: '20'

# Job único — evita artifact upload/download que exclui pastas ocultas (.next)
jobs:
  build-and-deploy:
    name: Build & Deploy → Azure
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🔍 Lint
        run: npm run lint

      - name: 🏗️ Build (Next.js standalone)
        run: npm run build
        env:
          NODE_ENV: production
          NASA_API_KEY:       ${{ secrets.NASA_API_KEY }}
          RELIEFWEB_APP_NAME: ${{ secrets.RELIEFWEB_APP_NAME }}

      - name: 📋 Copiar public/ e static/ para o standalone
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static

      - name: 🔐 Login no Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Deploy direto do diretório — sem artifact para preservar pastas ocultas
      - name: 🚀 Deploy para Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: .next/standalone
          startup-command: node server.js

      - name: 🔓 Logout do Azure
        if: always()
        run: az logout
